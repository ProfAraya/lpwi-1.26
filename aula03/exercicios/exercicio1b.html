<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>If</title>
</head>
<body>
    <h1>Exercício 1</h1>
    <p>Elabore um programa que leia um número.
        Informe se ele é ímpar ou par.
        Faça com o if...else... Tradicional e após,
        tente criar com o operador ternário.
    </p>
    <script>
        let numero = parseInt(prompt('Digite um número:'));
        // se o resto da divisão por 2 for zero 
        // então o número é par
        // senão o número é ímpar
        // operador ternário
        // varíavel = (condição)?'valor verdadeiro':'valor falso';

        let parOuImpar = '';
        if (numero%2 === 0) {
            parOuImpar = 'par';
        } else {
            parOuImpar = 'ímpar';
        }
        alert(`o número ${numero} é ${parOuImpar}`);
        console.log(`o número ${numero} é ${parOuImpar}`);

    </script>

</body>
</html>
