<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // é necessário usar uma função que converta texto para número
        // porque o prompt sempre lê os dados como texto
        // pode usar Number(), parseInt() ou parseFloat()
        let numero1 = Number(prompt('Digite um número inteiro:'));
        let numero2 = Number(prompt('Digite outro número inteiro:'));

        let multiplicacao = numero1 * numero2;
        alert(`O produto de ${numero1} e ${numero2} é ${multiplicacao}`);
        let divisao = numero1 / numero2;
        alert(`A divisão de ${numero1} por ${numero2} é ${divisao.toFixed(2)}`);
        let subtracao = numero1 - numero2;
        alert(`A subtração de ${numero1} menos ${numero2} é ${subtracao}`);
        // o sinal de + é operador de concatenação e de soma
        // para que efetue a soma é necessário converter os valores obtidos com prompt
        // para número antes de efetuar a operação.
        let soma = numero1 + numero2;
        alert(`A soma de ${numero1} e ${numero2} é ${soma}`);



    </script>

</body>
</html>
