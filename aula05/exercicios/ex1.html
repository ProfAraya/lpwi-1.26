<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Funções - Exercício 1</h1>
    <p>Boas-vindas. Crie uma função que receba um nome e retorne a mensagem 'Bem-vindo, <nome>!'
</p>

<script>
    // obter nome infomado pelo usuário
    let nome = prompt('Digite seu nome:');


    /*
    definição da função da forma tradicional:

    let mensagem = function (nome) {
      return `Bem-vindo, ${nome}`
    }
    */
   // transformando em arrow function

    let mensagem = x => `Bem-vindo, ${x}`;

    alert(mensagem(nome));

</script>
</body>
</html>
